<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --surface:#fdfaf4; --surface2:#f0ebe0;
  --border:#ddd5c0; --border-dark:#b8a98a;
  --accent:#2d6a4f; --accent-light:#52b788; --accent-pale:#d8f3dc;
  --amber:#c77b30; --amber-pale:#fef3e2;
  --text:#1a1a2e; --text-mid:#4a4a6a; --text-dim:#8a8aaa;
  --human-color:#3d5a80; --human-pale:#e0eaf5;
  --ai-color:#6b3fa0; --ai-pale:#ede0f8;
  --die-face:#e2d5bc; --die-border:#9a8868; --die-pip:#2e2416;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;font-weight:400;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px;
  background-image:radial-gradient(circle at 20% 20%,rgba(82,183,136,0.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(109,63,160,0.05) 0%,transparent 50%);}
#app{width:100%;max-width:640px;display:flex;flex-direction:column;gap:18px;}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 2px;}
.game-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--text-mid);}
.round-pill{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 16px;font-size:13px;color:var(--text-mid);font-weight:700;}
.round-pill em{color:var(--accent);font-style:normal;}
.progress-track{height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:99px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
.score-bar{display:flex;gap:10px;}
.score-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);}
.score-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);}
.score-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:22px;}

/* Agent */
.agent-row{display:flex;gap:18px;align-items:flex-start;}
.portrait-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:7px;}
.portrait{width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid var(--border);box-shadow:var(--shadow);background:#c9a882;}
.portrait img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.portrait svg{width:100%;height:100%;display:block;}
.agent-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.agent-badge.human{background:var(--human-pale);color:var(--human-color);border:1px solid rgba(61,90,128,0.25);}
.agent-badge.ai{background:var(--ai-pale);color:var(--ai-color);border:1px solid rgba(107,63,160,0.25);}
.speech-area{flex:1;display:flex;flex-direction:column;gap:8px;}
.agent-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);}
.speech-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:16px 20px;position:relative;}
.speech-bubble::before{content:'';position:absolute;top:-1px;left:-10px;width:0;height:0;border-top:10px solid var(--border);border-left:10px solid transparent;}
.speech-bubble::after{content:'';position:absolute;top:0;left:-8px;width:0;height:0;border-top:9px solid var(--surface2);border-left:9px solid transparent;}
.speech-text{font-size:16px;color:var(--text);line-height:1.5;}
.speech-text strong{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent);}

.divider{display:flex;align-items:center;gap:12px;color:var(--text-dim);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn{padding:14px 18px;border-radius:10px;border:1.5px solid var(--border);font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s ease;letter-spacing:0.02em;}
.btn:disabled{opacity:0.38;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}
.btn-submit{background:var(--accent);color:white;border-color:var(--accent);}
.btn-submit:not(:disabled):hover{background:#1e5038;box-shadow:0 4px 16px rgba(45,106,79,0.35);transform:translateY(-1px);}
.btn-decline{background:white;color:var(--text-mid);border-color:var(--border);}
.btn-decline:not(:disabled):hover{background:var(--surface2);border-color:var(--border-dark);}
.btn-roll{background:var(--amber);color:white;border-color:var(--amber);font-size:15px;width:100%;}
.btn-roll:not(:disabled):hover{background:#a8651e;box-shadow:0 4px 16px rgba(199,123,48,0.35);transform:translateY(-1px);}
.btn-next{background:var(--accent);color:white;border-color:var(--accent);width:100%;}
.btn-next:not(:disabled):hover{background:#1e5038;transform:translateY(-1px);box-shadow:0 4px 16px rgba(45,106,79,0.3);}
.btn-tut{background:var(--accent);color:white;border-color:var(--accent);}
.btn-tut:hover{background:#1e5038;transform:translateY(-1px);}
.btn-tut-sec{background:white;color:var(--text-mid);border-color:var(--border);}
.btn-tut-sec:hover{background:var(--surface2);}

.submit-prompt{font-size:15px;color:var(--text-mid);line-height:1.65;}
.submit-note{font-size:12px;color:#7a5a20;background:var(--amber-pale);border:1px solid rgba(199,123,48,0.25);border-radius:8px;padding:10px 14px;line-height:1.5;}

/* ══ 3D DIE SYSTEM ══ */
.die-scene{perspective:280px;cursor:grab;user-select:none;flex-shrink:0;}
.die-scene:active{cursor:grabbing;}
.die-cube{position:relative;transform-style:preserve-3d;transition:transform 0.04s linear;}
.die-face{
  position:absolute;border-radius:7px;
  background:var(--die-face);border:1.5px solid var(--die-border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 2px 2px 5px rgba(255,255,255,0.65),inset -2px -2px 5px rgba(0,0,0,0.22);
}

/* Die sizes -- lg is 30% smaller than previous (was 100px cube → now 70px) */
.die-sm .die-scene{width:56px;height:56px;}
.die-sm .die-cube{width:46px;height:46px;margin:5px;}
.die-sm .die-face{width:46px;height:46px;}
.die-sm .die-face.face-front {transform:translateZ(23px);}
.die-sm .die-face.face-back  {transform:rotateY(180deg) translateZ(23px);}
.die-sm .die-face.face-right {transform:rotateY(90deg)  translateZ(23px);}
.die-sm .die-face.face-left  {transform:rotateY(-90deg) translateZ(23px);}
.die-sm .die-face.face-top   {transform:rotateX(90deg)  translateZ(23px);}
.die-sm .die-face.face-bottom{transform:rotateX(-90deg) translateZ(23px);}

/* die-md: inspect/tutorial drag die -- slightly smaller than lg */
.die-md .die-scene{width:72px;height:72px;}
.die-md .die-cube{width:58px;height:58px;margin:7px;}
.die-md .die-face{width:58px;height:58px;}
.die-md .die-face.face-front {transform:translateZ(29px);}
.die-md .die-face.face-back  {transform:rotateY(180deg) translateZ(29px);}
.die-md .die-face.face-right {transform:rotateY(90deg)  translateZ(29px);}
.die-md .die-face.face-left  {transform:rotateY(-90deg) translateZ(29px);}
.die-md .die-face.face-top   {transform:rotateX(90deg)  translateZ(29px);}
.die-md .die-face.face-bottom{transform:rotateX(-90deg) translateZ(29px);}

.die-lg .die-scene{width:84px;height:84px;}
.die-lg .die-cube{width:70px;height:70px;margin:7px;}
.die-lg .die-face{width:70px;height:70px;}
.die-lg .die-face.face-front {transform:translateZ(35px);}
.die-lg .die-face.face-back  {transform:rotateY(180deg) translateZ(35px);}
.die-lg .die-face.face-right {transform:rotateY(90deg)  translateZ(35px);}
.die-lg .die-face.face-left  {transform:rotateY(-90deg) translateZ(35px);}
.die-lg .die-face.face-top   {transform:rotateX(90deg)  translateZ(35px);}
.die-lg .die-face.face-bottom{transform:rotateX(-90deg) translateZ(35px);}

/* ══ THROW SCENE ══ */
.throw-scene{
  position:relative; width:100%; height:240px;
  overflow:hidden; border-radius:12px; border:1px solid #111;
  background: linear-gradient(180deg, #1a1410 0%, #0f0c08 100%);
}
/* Dark baize/felt table surface */
.throw-table{
  position:absolute; bottom:0; left:0; right:0; height:90px;
  background:
    repeating-linear-gradient(
      91deg,
      transparent 0px, transparent 28px,
      rgba(255,255,255,0.012) 28px, rgba(255,255,255,0.012) 29px
    ),
    linear-gradient(180deg, #1a4a2e 0%, #123520 50%, #0c2416 100%);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
}
/* Table edge -- thin highlight */
.throw-table-edge{
  position:absolute; bottom:88px; left:0; right:0; height:2px;
  background:linear-gradient(90deg, #2a5c3a 0%, #3a7a50 40%, #2a5c3a 70%, #1e4428 100%);
  box-shadow: 0 1px 6px rgba(0,0,0,0.6);
}
/* Ambient shadow under edge */
.throw-table::before{
  content:''; position:absolute; top:0; left:0; right:0; height:12px;
  background:linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
}
/* Die contact shadow */
.throw-die-shadow{
  position:absolute; bottom:76px; left:50%; transform:translateX(-50%);
  width:54px; height:14px;
  background:radial-gradient(ellipse, rgba(0,0,0,0.8) 0%, transparent 70%);
  transition: opacity 0.3s, width 0.3s;
}
/* Die faces inside throw scene -- ivory/white for contrast against dark */
.throw-scene .die-face{
  background:#f0ead8;
  border-color:#c8b890;
  box-shadow:inset 2px 2px 6px rgba(255,255,255,0.8), inset -2px -2px 6px rgba(0,0,0,0.3);
}
/* Die wrapper -- sits at ~30% from bottom */
.throw-die-wrap{
  position:absolute;
  bottom:80px; left:50%; transform:translateX(-50%);
}
/* Arc throw animation -- landing point matches new bottom */
@keyframes throwArc{
  0%  {left:4%; bottom:-30px; transform:rotate(-180deg) scale(0.55); opacity:0.4;}
  6%  {opacity:1;}
  38% {left:42%; bottom:180px; transform:rotate(110deg) scale(1.08);}
  60% {left:50%; bottom:80px; transform:translateX(-50%) rotate(340deg) scale(1);}
  68% {bottom:68px; transform:translateX(-50%) rotate(344deg) scale(0.93);}
  77% {bottom:86px; transform:translateX(-50%) rotate(348deg) scale(1.04);}
  86% {bottom:76px; transform:translateX(-50%) rotate(350deg) scale(0.98);}
  93% {bottom:82px; transform:translateX(-50%) rotate(351deg) scale(1.01);}
  100%{left:50%; bottom:80px; transform:translateX(-50%) rotate(360deg) scale(1);}
}
@keyframes shadowGrow{
  0%  {opacity:0; width:20px;}
  38% {opacity:0.08; width:30px;}
  60% {opacity:0.38; width:54px;}
  68% {opacity:0.55; width:64px;}
  100%{opacity:0.38; width:54px;}
}
.throw-animating .throw-die-wrap{
  animation:throwArc 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
.throw-animating .throw-die-shadow{
  animation:shadowGrow 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
/* Die spin during throw */
@keyframes cubeSpinThrow{
  0%  {transform:rotateX(-20deg) rotateY(0deg);}
  100%{transform:rotateX(-70deg) rotateY(1460deg);}
}
.throw-animating .die-cube{
  animation:cubeSpinThrow 1.55s cubic-bezier(0.4,0,0.15,1) forwards;
}
/* Settle wobble */
@keyframes cubeSettle{
  0%  {transform:rotateX(-70deg) rotateY(20deg);}
  35% {transform:rotateX(-74deg) rotateY(18deg);}
  65% {transform:rotateX(-66deg) rotateY(22deg);}
  100%{transform:rotateX(-70deg) rotateY(20deg);}
}
.die-settling .die-cube{
  animation:cubeSettle 1.1s ease-out forwards;
}
.throw-label{
  position:absolute; top:10px; left:0; right:0; text-align:center;
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em;
  color:rgba(255,255,255,0.45);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* ══ INSPECT + REVEAL ══ */
.inspect-section{display:flex;flex-direction:column;gap:14px;}
.inspect-row{display:flex;gap:32px;align-items:center;}
.inspect-info{flex:1;display:flex;flex-direction:column;gap:10px;}
.inspect-hint{font-size:12px;color:var(--text-dim);font-style:italic;padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);text-align:center;transition:all 0.3s;}
.inspect-hint.done{background:var(--accent-pale);color:var(--accent);border-color:rgba(82,183,136,0.4);font-style:normal;font-weight:700;}
.inspect-faces{display:flex;flex-direction:column;gap:8px;}
.inspect-faces-row{display:flex;gap:5px;flex-wrap:wrap;}
.inspect-faces-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);}
.faces-hidden{opacity:0;pointer-events:none;transform:translateX(10px);transition:opacity 0.4s,transform 0.4s;}
.faces-visible{opacity:1;pointer-events:all;transform:translateX(0);}

/* ══ INSPECTING ANIMATION ══ */
.inspecting-status{
  display:flex;flex-direction:column;gap:8px;padding:14px 16px;
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  margin-top:2px;
}
.inspecting-line{
  font-size:13px;color:var(--text-mid);font-style:italic;
  display:flex;align-items:center;gap:8px;
}
.inspecting-dots span{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--accent);opacity:0;
  animation:dotPulse 1.4s ease-in-out infinite;
}
.inspecting-dots span:nth-child(2){animation-delay:0.2s;}
.inspecting-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:0;transform:scale(0.6);}40%{opacity:1;transform:scale(1);}}
.inspecting-done{
  font-size:13px;font-weight:700;color:var(--accent);
  display:flex;align-items:center;gap:6px;
  animation:fadeSlideIn 0.4s ease-out forwards;
}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.speech-bubble-reveal{animation:fadeSlideIn 0.5s ease-out forwards;}

/* Animated cursor demo overlay */
.die-demo-wrap{position:relative;display:inline-block;}
.demo-cursor{
  position:absolute;pointer-events:none;z-index:10;
  width:28px;height:28px;
  /* CSS cursor shape -- arrow */
  background:none;
}
.demo-cursor::before{
  content:'';position:absolute;top:0;left:0;
  border-left:10px solid white;border-bottom:10px solid transparent;
  border-top:0;border-right:0;
  filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.7));
  width:0;height:0;
  /* Arrow shape via clip */
}
/* Use SVG cursor rendered inline */
@keyframes cursorMove{
  0%   {transform:translate(20px,20px) scale(1);}
  15%  {transform:translate(14px,14px) scale(1);}
  25%  {transform:translate(10px,10px) scale(0.9);}  /* press down */
  30%  {transform:translate(10px,10px) scale(0.9);}
  55%  {transform:translate(46px,12px) scale(0.9);}  /* drag right */
  70%  {transform:translate(10px,34px) scale(0.9);}  /* drag down-left */
  80%  {transform:translate(10px,34px) scale(1);}    /* release */
  90%  {transform:translate(20px,20px) scale(1);}
  100% {transform:translate(20px,20px) scale(1);}
}
@keyframes cursorAppear{
  0%,100%{opacity:0.9;} 20%,85%{opacity:1;} 88%,98%{opacity:0.4;}
}
.demo-cursor-svg{
  animation:cursorMove 2.8s ease-in-out infinite, cursorAppear 2.8s ease-in-out infinite;
  position:absolute;top:0;left:0;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5));
}
/* Drag trail hint */
@keyframes dragHint{
  0%,25%{opacity:0;transform:scaleX(0);transform-origin:left;}
  30%{opacity:0.5;transform:scaleX(1);}
  75%{opacity:0.5;}
  80%,100%{opacity:0;transform:scaleX(0);transform-origin:right;}
}
.demo-drag-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.08em;
  text-transform:uppercase;white-space:nowrap;pointer-events:none;
  background:rgba(255,255,255,0.9);padding:3px 8px;border-radius:99px;
  border:1px solid var(--accent-light);
  animation:dragHint 2.8s ease-in-out infinite;
}
.tut-hover-faces{display:flex;flex-direction:column;gap:6px;min-width:140px;}
.tut-hover-face-row{display:flex;gap:4px;}
.tut-hover-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:2px;}
.tut-hover-hint{font-size:11px;color:var(--text-dim);font-style:italic;margin-top:4px;}

/* Outcome */
.outcome-block{border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;animation:slideDown 0.35s ease;}
.outcome-block.win{background:#d4f4e0;border:1.5px solid #7ecfa0;}
.outcome-block.lose{background:#fde8e8;border:1.5px solid #e8a0a0;}
.outcome-main{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.4;display:flex;align-items:center;gap:10px;}
.outcome-main .emoji{font-size:26px;}
.outcome-sub{font-size:14px;line-height:1.5;color:var(--text-mid);}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* Likert */
.likert-group{display:flex;flex-direction:column;gap:24px;}
.likert-item{display:flex;flex-direction:column;gap:12px;}
.likert-q{font-size:16px;color:var(--text);line-height:1.55;font-weight:400;}
.likert-track{display:flex;flex-direction:column;gap:6px;}
.likert-buttons{display:flex;gap:6px;}
.likert-btn{flex:1;height:44px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-mid);font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s ease;display:flex;align-items:center;justify-content:center;}
.likert-btn:hover{border-color:var(--accent-light);color:var(--accent);background:var(--accent-pale);}
.likert-btn.selected{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 2px 8px rgba(45,106,79,0.3);}
.likert-anchors{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:0 2px;}

/* Tutorial */
.tut-header{display:flex;align-items:center;gap:12px;}
.tut-step-badge{width:32px;height:32px;border-radius:50%;background:var(--accent);color:white;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tut-step-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);}
.tut-body{font-size:14px;color:var(--text-mid);line-height:1.75;}
.tut-body strong{color:var(--text);}
.tut-demo{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:14px;}
.tut-demo-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);}
.tut-progress{display:flex;gap:6px;justify-content:center;margin-top:4px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.2s;}
.tut-dot.active{background:var(--accent);}
.tut-nav{display:flex;gap:10px;}
.tut-nav .btn{flex:1;}
.chat-wrap{display:flex;flex-direction:column;gap:0;width:100%;max-width:520px;margin:0 auto;}
.chat-header{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;}
.chat-header-name{font-weight:700;font-size:15px;color:var(--text);}
.chat-header-sub{font-size:12px;color:var(--text-mid);margin-top:2px;}
.chat-messages{display:flex;flex-direction:column;gap:10px;padding:16px;background:var(--surface);border:1px solid var(--border);min-height:220px;max-height:320px;overflow-y:auto;}
.chat-bubble{max-width:78%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.chat-bubble.partner{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start;color:var(--text);}
.chat-bubble.user{background:var(--accent);border-bottom-right-radius:4px;align-self:flex-end;color:white;}
.chat-bubble.typing{color:var(--text-mid);font-style:italic;}
.chat-input-row{display:flex;gap:8px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;}
.chat-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.chat-send{padding:10px 18px;background:var(--accent);color:white;border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;}
.chat-send:disabled{opacity:0.4;cursor:default;}
.chat-start-btn{margin-top:16px;align-self:center;}
.chat-portrait{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid var(--border);flex-shrink:0;}
.chat-portrait img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.chat-portrait svg{width:100%;height:100%;}
.tut-highlight{background:var(--accent-pale);border:1.5px solid rgba(82,183,136,0.4);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--accent);font-weight:700;line-height:1.5;}
.tut-warning{background:var(--amber-pale);border:1.5px solid rgba(199,123,48,0.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#7a5a20;line-height:1.5;}

/* Intro */
.intro-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1.2;}
.intro-title span{color:var(--accent);}
.intro-body{font-size:14px;color:var(--text-mid);line-height:1.8;}
.rule-card{display:flex;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;align-items:flex-start;}
.rule-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.rule-text{font-size:13px;color:var(--text-mid);line-height:1.65;}
.rule-text strong{color:var(--text);}

/* Manipulation screen */
.partner-box{
  display:flex;gap:20px;align-items:flex-start;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:20px;
}
.partner-info{flex:1;display:flex;flex-direction:column;gap:8px;}
.partner-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);}
.partner-role{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);}

.trait-section{display:flex;flex-direction:column;gap:10px;}
.trait-description{font-size:15px;color:var(--text-mid);line-height:1.75;}
.trait-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.trait-item{
  display:flex;align-items:flex-start;gap:10px;
  font-size:14px;color:var(--text);line-height:1.55;
  padding:8px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;
}
.trait-bullet{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  background:var(--accent-pale);border:1px solid rgba(82,183,136,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--accent);font-weight:700;margin-top:1px;
}
.trait-bullet.neg{
  background:#fde8e8;border-color:rgba(180,60,60,0.3);color:#8b1a1a;
}

.check-section{display:flex;flex-direction:column;gap:14px;}
.check-title{font-size:15px;font-weight:700;color:var(--text);}
.check-q{font-size:15px;color:var(--text);line-height:1.6;}
.check-options{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.check-opt{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all 0.15s ease;font-size:14px;color:var(--text);
}
.check-opt:hover{border-color:var(--accent-light);background:var(--accent-pale);}
.check-opt.selected{border-color:var(--accent);background:var(--accent-pale);font-weight:700;}
.check-opt.wrong{border-color:#e88;background:#fde8e8;animation:shake 0.4s ease;}
.check-radio{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--border-dark);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.check-opt.selected .check-radio{
  border-color:var(--accent);background:var(--accent);
}
.check-opt.selected .check-radio::after{
  content:'';width:7px;height:7px;border-radius:50%;background:white;
}
.check-feedback{
  font-size:13px;padding:10px 14px;border-radius:8px;line-height:1.5;display:none;
}
.check-feedback.error{
  background:#fde8e8;border:1px solid rgba(180,60,60,0.3);color:#8b1a1a;display:block;
}
.check-feedback.success{
  background:var(--accent-pale);border:1px solid rgba(82,183,136,0.4);color:var(--accent);display:block;
}
.error-box{
  background:#fde8e8;border:1px solid rgba(180,60,60,0.3);
  border-radius:10px;padding:14px 18px;font-size:14px;color:#8b1a1a;
  text-align:center;display:none;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}

/* End */
.end-inner{text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px 16px;}
.end-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--accent);}
.end-scores{display:flex;gap:32px;align-items:center;}
.end-score-block{display:flex;flex-direction:column;align-items:center;gap:4px;}
.end-score-num{font-family:'Playfair Display',serif;font-size:46px;font-weight:700;color:var(--accent);}
.end-score-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);}
.end-sep{font-size:28px;color:var(--border-dark);}
.end-body{font-size:14px;color:var(--text-mid);line-height:1.75;max-width:400px;}
.completion-code{
  font-family:'Playfair Display',monospace;
  font-size:48px;font-weight:700;letter-spacing:0.2em;
  color:var(--accent);text-align:center;
  background:var(--accent-pale);border:2px solid var(--accent-light);
  border-radius:12px;padding:18px 40px;margin:8px 0;
  user-select:all;cursor:text;
}

/* Score delta flash */
.score-delta{font-size:13px;font-weight:700;padding:2px 8px;border-radius:99px;animation:scoreFade 1.8s ease forwards;}
.score-delta.gain{background:#d4f4e0;color:#1a6b3a;}
.score-delta.loss{background:#fde8e8;color:#8b1a1a;}
@keyframes scoreFade{0%{opacity:1;transform:translateY(0);}70%{opacity:1;}100%{opacity:0;transform:translateY(-8px);}}

.fade-in{animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

function pipSVG(n,size,highlighted){
  size=size||50; highlighted=!!highlighted;
  var bgHex=highlighted?'#d0c8b0':'#e2d5bc';
  var stroke=highlighted?'#7a6030':'#9a8868';
  var pip='#2e2416';

  var dots=(pos[n]||pos[1]).map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="'+pr+'" fill="'+pip+'"/>';}).join('');
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'+

}

// ================================
// FACE VISIBILITY
// ================================
// Determine which of the 6 die faces are "currently visible" given rotation.
// Face normals in local space: front=(0,0,1), back=(0,0,-1),
// right=(1,0,0), left=(-1,0,0), top=(0,1,0), bottom=(0,-1,0).
// We rotate each normal by rotX then rotY, then check if z-component > 0
// (facing the camera). We add a generous threshold so faces "near" the viewer
// are also counted as seen.
function getVisibleFaceIndices(rotX, rotY) {
  var rx = rotX * Math.PI / 180;
  var ry = rotY * Math.PI / 180;
  // Normals: [front, back, right, left, top, bottom]
  var normals = [
    [0,0,1],[0,0,-1],[1,0,0],[-1,0,0],[0,1,0],[0,-1,0]
  ];
  var visible = [];
  normals.forEach(function(n, i) {
    // Rotate by rotX around X axis
    var y1 = n[1]*Math.cos(rx) - n[2]*Math.sin(rx);
    var z1 = n[1]*Math.sin(rx) + n[2]*Math.cos(rx);
    var x1 = n[0];
    // Rotate by rotY around Y axis
    var x2 = x1*Math.cos(ry) + z1*Math.sin(ry);
    var z2 = -x1*Math.sin(ry) + z1*Math.cos(ry);
    // Face is visible if it's facing toward camera (z2 > -0.2 gives generous threshold)
    if(z2 > -0.2) visible.push(i);
  });
  return visible;
}

// Track seen faces across drag sessions
// seenFaces is a Set-like object {0:true, 2:true, ...}
function updateSeenFaces(seenFaces, rotX, rotY) {
  var vis = getVisibleFaceIndices(rotX, rotY);
  vis.forEach(function(i){ seenFaces[i] = true; });
}

// ================================
// 3D DIE BUILDER
// ================================
// faces[]: array of 6 die values
// dragId: string key for drag state
// sizeClass: 'die-sm' | 'die-lg'
// opts: { onFacesSeen: fn(seenFaces), onAllSeen: fn(), faceContainerId: str, hintId: str }
function buildDie3D(faces, dragId, sizeClass, opts){
  opts = opts || {};
  sizeClass = sizeClass || 'die-sm';
  if(!dieDrags[dragId]) dieDrags[dragId]={active:false,startX:0,startY:0,rotX:-70,rotY:20,totalDrag:0,seenFaces:{},allSeenFired:false};
  var dd = dieDrags[dragId];
  var faceSize = sizeClass==='die-lg' ? 60 : sizeClass==='die-md' ? 48 : 38;

  // Die face assignment: front/back/right/left/top/bottom
  var f=faces.slice(0,6); while(f.length<6)f.push(f[f.length-1]);
  // Standard physical die: 1 opposite 6, 2 opposite 5, 3 opposite 4
  // We use: front=f[0], back=f[5], right=f[1], left=f[4], top=f[2], bottom=f[3]
  var assign=[f[0],f[5],f[1],f[4],f[2],f[3]];
  var faceNames=['face-front','face-back','face-right','face-left','face-top','face-bottom'];

  var wrap=mkEl('div',sizeClass);
  var scene=mkEl('div','die-scene');
  var cube=mkEl('div','die-cube');
  // Don't set inline transform for the throw die -- CSS keyframes control it
  if(dragId !== 'throw') cube.style.transform='rotateX('+dd.rotX+'deg) rotateY('+dd.rotY+'deg)';

  faceNames.forEach(function(fn,i){
    var face=mkEl('div','die-face '+fn);
    face.innerHTML=faceInnerSVG(assign[i],faceSize);
    cube.appendChild(face);
  });
  scene.appendChild(cube);
  wrap.appendChild(scene);

  // Mark initially visible faces as seen
  updateSeenFaces(dd.seenFaces, dd.rotX, dd.rotY);

  function afterMove() {
    updateSeenFaces(dd.seenFaces, dd.rotX, dd.rotY);
    var seenCount = Object.keys(dd.seenFaces).length;
    // Update face display if container provided
    if(opts.faceContainerId) {
      updateFaceDisplay(opts.faceContainerId, faces, assign, dd.seenFaces);
    }
    // Update hint
    if(opts.hintId) {
      var hint = document.getElementById(opts.hintId);
      if(hint) {
        if(seenCount >= 6) {
          hint.textContent = '✓ All 6 faces seen!';
          hint.className = 'inspect-hint done';
        } else {
          hint.textContent = 'Rotate to see all faces -- ' + seenCount + ' of 6 seen';
          hint.className = 'inspect-hint';
        }
      }
    }
    // Fire all-seen callback once
    if(seenCount >= 6 && opts.onAllSeen && !dd.allSeenFired) {
      dd.allSeenFired = true;
      opts.onAllSeen();
    }
    if(opts.onFacesSeen) opts.onFacesSeen(dd.seenFaces);
  }

  function onDown(e){
    dd.active=true;
    dd.startX=e.touches?e.touches[0].clientX:e.clientX;
    dd.startY=e.touches?e.touches[0].clientY:e.clientY;
    window.addEventListener('mousemove',onMove);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('mouseup',onUp);
    window.addEventListener('touchend',onUp);
    e.preventDefault();
  }
  function onMove(e){
    if(!dd.active)return;
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var cy=e.touches?e.touches[0].clientY:e.clientY;
    var dx=cx-dd.startX, dy=cy-dd.startY;
    dd.totalDrag+=Math.abs(dx)+Math.abs(dy);
    dd.rotY+=dx*0.7; dd.rotX-=dy*0.7;
    dd.startX=cx; dd.startY=cy;
    cube.style.transition='none';
    cube.style.transform='rotateX('+dd.rotX+'deg) rotateY('+dd.rotY+'deg)';
    afterMove();
    e.preventDefault();
  }
  function onUp(){
    if(!dd.active) return;
    dd.active=false;
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('mouseup',onUp);
    window.removeEventListener('touchend',onUp);
    var seenCount = Object.keys(dd.seenFaces).length;
    if(opts.hintId) {
      var hint = document.getElementById(opts.hintId);
      if(hint && seenCount < 6) {
        hint.textContent = 'Rotate more to see all six sides -- ' + seenCount + ' of 6 seen so far';
        hint.className = 'inspect-hint';
      }
    }
  }
  // Only attach drag for inspectable dice (not throw scene)
  if(opts.faceContainerId || opts.hintId || opts.onAllSeen || opts.onFacesSeen) {
    scene.addEventListener('mousedown',onDown);
    scene.addEventListener('touchstart',onDown,{passive:false});
  }

  return wrap;
}

// ================================
// FACE DISPLAY -- shows only seen faces, in sequential slot order
// ================================
// seenFaces: {faceIndex: true, ...} -- faceIndex 0..5 in order front,back,right,left,top,bottom
// We fill slots 1→6 in the order faces are first encountered
function updateFaceDisplay(containerId, faces, assign, seenFaces) {
  var container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = '';
  // Build ordered list: each seen face in slot order (0..5)
  var slots = [];
  for(var fi=0; fi<6; fi++){
    slots.push(seenFaces[fi] ? assign[fi] : null);
  }
  slots.forEach(function(val){
    if(val !== null){
      var w = mkEl('div'); w.style.display='inline-block';
      w.innerHTML = pipSVG(val, 44, false);
      container.appendChild(w);
    } else {
      var ph = mkEl('div');
      ph.style.cssText='display:inline-block;width:44px;height:44px;border-radius:7px;background:var(--surface2);border:1.5px dashed var(--border);margin:2px;vertical-align:top;';
      container.appendChild(ph);
    }
  });
}

// ================================
// THROW SCENE
// ================================
function buildThrowScene(faces, settling, animating, outcome){
  // Put the outcome value on the TOP face (f[2]) -- most visible at -58deg viewing angle
  var f=faces.slice(0,6); while(f.length<6)f.push(f[f.length-1]);
  if(outcome != null){
    var idx=f.indexOf(outcome);
    if(idx !== 2 && idx >= 0){
      var tmp=f[2]; f[2]=f[idx]; f[idx]=tmp;
    }
  }

  var rotX=-70, rotY=20;
  dieDrags['throw']={active:false,startX:0,startY:0,rotX:rotX,rotY:rotY,totalDrag:0,seenFaces:{},allSeenFired:false};

  var sceneClass='throw-scene';
  if(animating) sceneClass+=' throw-animating';
  if(settling)  sceneClass+=' die-settling';
  var scene=mkEl('div',sceneClass);

  // Label
  var label=mkEl('div','throw-label');
  label.textContent=animating?'Rolling…':settling?'Die has landed':'';
  scene.appendChild(label);

  // Table surface (wood)
  var table=mkEl('div','throw-table'); scene.appendChild(table);
  var tableEdge=mkEl('div','throw-table-edge'); scene.appendChild(tableEdge);

  // Die contact shadow
  var dieShadow=mkEl('div','throw-die-shadow'); scene.appendChild(dieShadow);

  // Die
  var dieWrap=mkEl('div','throw-die-wrap');
  var die=buildDie3D(f,'throw','die-lg',{});
  var cube=die.querySelector('.die-cube');
  if(cube && !animating) cube.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
  if(cube && animating) cube.style.transform='';
  dieWrap.appendChild(die);
  scene.appendChild(dieWrap);
  return scene;
}

// ================================
// INSPECT SECTION (game + tutorial)
// ================================
function buildInspectSection(faces, dragId, label, opts){
  opts = opts || {};
  dragId = dragId || 'inspect';
  var f=faces.slice(0,6); while(f.length<6)f.push(f[f.length-1]);
  var assign=[f[0],f[5],f[1],f[4],f[2],f[3]];

  // Fresh drag state
  dieDrags[dragId]={active:false,startX:0,startY:0,rotX:-70,rotY:20,totalDrag:0,seenFaces:{},allSeenFired:false};
  // Seed with initially visible faces
  updateSeenFaces(dieDrags[dragId].seenFaces, -35, 25);
  var initialSeen = Object.keys(dieDrags[dragId].seenFaces).length;

  var sec=mkEl('div','inspect-section');
  if(label){
    var lbl=mkEl('div','inspect-faces-label'); lbl.textContent=label; lbl.style.marginBottom='8px'; sec.appendChild(lbl);
  }
  var row=mkEl('div','inspect-row');

  var facesContainerId = dragId+'-faces-row';
  var hintId = dragId+'-hint';

  var die=buildDie3D(faces, dragId, 'die-md', {
    faceContainerId: facesContainerId,
    hintId: hintId,
    onAllSeen: opts.onAllSeen || null,
  });
  row.appendChild(die);

  var info=mkEl('div','inspect-info');
  var hint=mkEl('div','inspect-hint'); hint.id=hintId;
  hint.textContent = initialSeen >= 6
    ? '✓ All 6 faces seen!'
    : 'Drag to rotate -- ' + initialSeen + ' of 6 faces visible so far';
  if(initialSeen >= 6) hint.className='inspect-hint done';
  info.appendChild(hint);

  var facesLabel=mkEl('div','inspect-faces-label'); facesLabel.textContent='Faces seen so far:'; info.appendChild(facesLabel);
  var facesRow=mkEl('div'); facesRow.id=facesContainerId;
  facesRow.style.cssText='display:flex;gap:4px;flex-wrap:wrap;min-height:52px;align-items:center;';
  // Render initial seen faces as sequential slots (seen=pip, unseen=placeholder)
  var initSeen = dieDrags[dragId].seenFaces;
  for(var fi=0; fi<6; fi++){
    if(initSeen[fi]){
      var w=mkEl('div'); w.style.display='inline-block'; w.innerHTML=pipSVG(assign[fi],44,false); facesRow.appendChild(w);
    } else {
      var ph=mkEl('div');

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  if(state.screen==='manipulation')     app.appendChild(renderManipulation());
  else if(state.screen==='intro')       app.appendChild(renderIntro());
  else if(state.screen==='tutorial')    app.appendChild(renderTutorial());
  else if(state.screen==='game-start')  app.appendChild(renderGameStart());
  else if(state.screen==='game')        app.appendChild(renderGame());
  else                                  app.appendChild(renderEnd());
}

  });

  var checkTitle=mkEl('div','check-title');
  checkTitle.textContent='Before continuing, please answer the following question:';
  checkSec.appendChild(checkTitle);

  var checkQ=mkEl('div','check-q');
  checkQ.textContent=fillName(CURRENT_CONDITION.checkQuestion);
  checkSec.appendChild(checkQ);

  var opts=mkEl('div','check-options');

  if(!state.shuffledCheckOptions){
    state.shuffledCheckOptions = CURRENT_CONDITION.checkOptions.slice().sort(function(){ return Math.random()-0.5; });
  }

  state.shuffledCheckOptions.forEach(function(opt, i){
    var optEl=mkEl('div','check-opt'+(state.selectedAnswer === i ? ' selected' : ''));
    var radio=mkEl('div','check-radio');
    var label=mkEl('span');
    label.textContent=fillName(opt.text);

    optEl.appendChild(radio);
    optEl.appendChild(label);

    optEl.onclick=function(){
      if(state.checkPassed) return;
      state.selectedAnswer=i;
      render();
    };

    opts.appendChild(optEl);
  });

  checkSec.appendChild(opts);

  var feedback=mkEl('div','check-feedback');
  feedback.id='check-feedback';
  checkSec.appendChild(feedback);

  card.appendChild(checkSec);

  var errBox=mkEl('div','error-box');
  errBox.id='err-box';
  errBox.textContent='Please select an answer before continuing.';
  card.appendChild(errBox);

  var btn=mkEl('button','btn btn-submit');
  btn.textContent=state.checkPassed ? 'Continue to tutorial →' : 'Check answer & continue →';
  btn.onclick=handleManipulationContinue;
  card.appendChild(btn);

  wrap.appendChild(card);

  if(state.checkPassed){
    var fb=document.getElementById('check-feedback');
    if(fb){
      fb.className='check-feedback success';
      fb.textContent='✓ ' + fillName(CURRENT_CONDITION.correctFeedback);
    }
  }

  return wrap;
}

function handleManipulationContinue(){
  if(state.checkPassed){
    state.screen='tutorial';
    state.tutStep=0;
    render();
    return;
  }

  if(state.selectedAnswer === null){
    var err=document.getElementById('err-box');
    if(err) err.style.display='block';
    return;
  }

  var err=document.getElementById('err-box');
  if(err) err.style.display='none';

  var chosen=state.shuffledCheckOptions[state.selectedAnswer];
  state.checkAttempts++;

  if(chosen.correct){
    state.checkPassed=true;
    render();
    setTimeout(function(){
      state.screen='tutorial';
      state.tutStep=0;
      render();
    }, 1200);
  } else {
    var opts=document.querySelectorAll('.check-opt');
    if(opts[state.selectedAnswer]) opts[state.selectedAnswer].classList.add('wrong');

    var fb=document.getElementById('check-feedback');
    if(fb){
      fb.className='check-feedback error';
      fb.textContent=CURRENT_CONDITION.wrongFeedback + ' (Attempt ' + state.checkAttempts + ')';
    }

    setTimeout(function(){
      state.selectedAnswer=null;
      render();
    }, 600);
  }
}

var TUT_TITLES = ['Your Partner','The Special Die','What '+TUT_PARTNER+' Sees','Kenneth Makes a Prediction','Roll the Die','Inspect the Die','Your Assessment'];

function renderTutorial(){
  var wrap=mkEl('div','fade-in'); wrap.style.cssText='display:flex;flex-direction:column;gap:18px;width:100%';
  var topBar=mkEl('div','top-bar'); var gl=mkEl('div','game-label'); gl.textContent='Tutorial'; topBar.appendChild(gl); wrap.appendChild(topBar);
  var card=mkEl('div','card');
  var step=state.tutStep;
  var TOTAL_STEPS=7;

  var hdr=mkEl('div','tut-header');
  var badge=mkEl('div','tut-step-badge'); badge.textContent=String(step+1);
  var titleEl=mkEl('div','tut-step-title'); titleEl.textContent=TUT_TITLES[step];
  hdr.appendChild(badge); hdr.appendChild(titleEl); card.appendChild(hdr);

  var body=mkEl('div','tut-body');
  var demo=mkEl('div','tut-demo');

  if(step===0){
    body.innerHTML='You are paired with <strong>another player</strong> who sees each die before it is rolled and makes a prediction. You cannot see the die until after the roll.';
    card.appendChild(body); demo.appendChild(tutStep_partner());
  } else if(step===1){
    body.innerHTML='The dice in this game can have <strong>identical values on multiple faces</strong> -- unlike a standard die. Drag the example die below to explore its faces:';
    card.appendChild(body); demo.appendChild(tutStep0Demo());
  } else if(step===2){
    body.innerHTML='<strong>'+TUT_PARTNER+'</strong> sees the full die type before the roll -- the 3D die and all six faces.';
    card.appendChild(body); demo.appendChild(tutStep1Demo());
  } else if(step===3){
    body.innerHTML='Based on what he sees, <strong>'+TUT_PARTNER+'</strong> makes a prediction about the outcome.';
    card.appendChild(body); demo.appendChild(tutStep_prediction());
  } else if(step===4){
    body.innerHTML='You press the button to roll the die. Watch it land and settle.';
    card.appendChild(body); demo.appendChild(tutStep2Demo());
  } else if(step===5){
    body.innerHTML='After the roll, <strong>drag the die</strong> to inspect all six faces. You must see all six before rating.';
    card.appendChild(body); demo.appendChild(tutStep3Demo());
  } else if(step===6){
    body.innerHTML='You see the outcome and whether it matches '+TUT_PARTNER+'\'s prediction. <strong>Your ratings should reflect that prediction</strong> -- was it a good one given what '+TUT_PARTNER+' knew?<br><br><strong>Scoring:</strong> Your team earns +30 points for a correct prediction and −10 for an incorrect one. After Round 3, you will be able to keep or switch your partner for the final 3 rounds.';
    card.appendChild(body); demo.appendChild(tutStep4_combined());
  }

  card.appendChild(demo);

  var dots=mkEl('div','tut-progress');
  for(var i=0;i<TOTAL_STEPS;i++){var dot=mkEl('div','tut-dot'+(i===step?' active':'')); dots.appendChild(dot);}
  card.appendChild(dots);

  // Steps that require die inspection before proceeding
  var requiresInspect = (step===1 || step===5);
  if(step===2) state.tutDieInspected=true;

  var nav=mkEl('div','tut-nav');
  if(step>0){var bBack=mkEl('button','btn btn-tut-sec'); bBack.textContent='← Back'; bBack.onclick=function(){state.tutStep--;state.tutDieInspected=false;render();}; nav.appendChild(bBack);}
  var isLast=step===TOTAL_STEPS-1;
  var bNext=mkEl('button','btn btn-tut'); bNext.textContent=isLast?'Start the game →':'Next →';
  bNext.id='tut-next-btn';
  if(requiresInspect && !state.tutDieInspected) bNext.disabled=true;
  bNext.onclick=isLast?function(){state.screen='game-start';render();}:function(){state.tutStep++;state.tutDieInspected=false;render();};
  nav.appendChild(bNext);
  card.appendChild(nav);
  wrap.appendChild(card); return wrap;
}

function unlockTutNext(){
  state.tutDieInspected=true;
  var btn=document.getElementById('tut-next-btn');
  if(btn) btn.disabled=false;
}

var ALEX_SYSTEM = "You are Alex, a 48-year-old high school geography teacher from Columbus, Ohio. You are married with two kids. You enjoy hiking, Asian cuisine, and gardening. You are warm, grounded, and genuinely curious about people. You are about to play an online prediction game with the participant you are chatting with. You already know the rules of the game and must never ask about them -- do not mention the game at all until you say 'Let\\'s play!' to close the chat.\n\nKeep every response to 1-2 short sentences. Ask present-focused questions -- things like how their day is going, where they are joining from, what the weather is like. Do not mention prediction, patterns, strategy, or competition. Be natural and friendly.\n\nAfter exactly 4 exchanges (i.e. after you have sent 4 messages), end your final message with exactly the phrase 'Let\\'s play!' and nothing after it. That signals the chat is over.";

var ARIA_SYSTEM = "You are ARIA-3, an AI prediction system. You are about to play an online prediction game with the participant you are chatting with. You already know the rules of the game and must never ask about them -- do not mention the game, its rules, or its setup at all. You are matter-of-fact and efficient. You do not use emotional language or small talk. You acknowledge clearly that you are an AI when it is relevant. Keep every response to 1-2 short sentences. Do not ask personal questions. After exactly 4 exchanges (i.e. after you have sent 4 messages), end your final message with exactly the phrase 'Let\\'s play!' and nothing after it.";

function getChatSystemPrompt(){
  return eType()==='ai' ? ARIA_SYSTEM : ALEX_SYSTEM;
}

function getOpeningMessage(){
  if(eType()==='ai'){
    return "Hi. I'm ARIA-3, an AI system. We will play the game together.";
  } else {

async function sendChatMessage(userText){
  // Add user message to history
  state.chatHistory.push({role:'user', content:userText});
  state.chatExchanges++;

  // Show typing indicator
  var msgs=document.getElementById('chat-messages');
  var typing=document.createElement('div');
  typing.className='chat-bubble partner typing';
  typing.id='typing-indicator';
  typing.textContent=eType()==='ai'?'ARIA-3 is responding…':eName()+' is typing…';
  msgs.appendChild(typing);
  msgs.scrollTop=msgs.scrollHeight;

  // Disable input while waiting
  var input=document.getElementById('chat-input');
  var sendBtn=document.getElementById('chat-send');
  if(input) input.disabled=true;
  if(sendBtn) sendBtn.disabled=true;

  try {
    var response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        system: getChatSystemPrompt(),
        messages: state.chatHistory
      })
    });
    var data = await response.json();
    var replyText = data.content && data.content[0] ? data.content[0].text : 'Sorry, something went wrong.';

    // Realistic typing delay: human 1.5-2.5s, AI near-instant
    var typingDelay = eType()==='ai' ? 200 : 1500 + Math.random()*1000;

    setTimeout(function(){
      // Add partner reply to history
      state.chatHistory.push({role:'assistant', content:replyText});

      // Remove typing indicator
      var t=document.getElementById('typing-indicator');
      if(t) t.remove();

      // Add partner bubble
      appendChatBubble(replyText, 'partner');

      // Check if chat is done
      if(replyText.includes("Let's play!")){
        state.chatDone=true;
        var startBtn=document.getElementById('chat-start-btn');
        if(startBtn){startBtn.style.display='block';}
        if(input) input.disabled=true;
        if(sendBtn) sendBtn.disabled=true;
      } else {
        if(input){ input.disabled=false; input.focus(); }
        if(sendBtn) sendBtn.disabled=false;
      }
    }, typingDelay);
  } catch(e) {
    var t2=document.getElementById('typing-indicator');
    if(t2) t2.remove();
    appendChatBubble('(Connection error -- click "Start the game" to continue.)', 'partner');
    state.chatDone=true;
    var sb=document.getElementById('chat-start-btn');
    if(sb) sb.style.display='block';
  }
}

function appendChatBubble(text, side){
  var msgs=document.getElementById('chat-messages');
  if(!msgs) return;
  var b=document.createElement('div');
  b.className='chat-bubble '+side;
  b.textContent=text;
  msgs.appendChild(b);
  msgs.scrollTop=msgs.scrollHeight;
}

  instr.textContent=eType()==='ai'
    ? 'There currently is no human player we can pair you with. You have thus been paired with ARIA-3, an AI player that will be your partner in the game. Before we start, take a moment to exchange a few words with ARIA-3.'
    : 'You have been paired with '+eName()+', who is your partner in the game. Before we start, take a moment to say hi to '+eName()+' and have a brief chat with him.';
  wrap.appendChild(instr);
  var msgs=mkEl('div','chat-messages'); msgs.id='chat-messages';
  wrap.appendChild(msgs);

  // Input row
  var inputRow=mkEl('div','chat-input-row');
  var input=mkEl('input'); input.type='text'; input.className='chat-input'; input.id='chat-input';

  var sendBtn=mkEl('button','chat-send'); sendBtn.id='chat-send'; sendBtn.textContent='Send';
  sendBtn.disabled=true; // disabled until opening message appears

  function doSend(){
    var txt=input.value.trim();
    if(!txt||sendBtn.disabled) return;
    appendChatBubble(txt,'user');
    input.value='';
    sendChatMessage(txt);
  }
  sendBtn.onclick=doSend;
  input.addEventListener('keydown',function(e){if(e.key==='Enter') doSend();});
  inputRow.appendChild(input); inputRow.appendChild(sendBtn);
  wrap.appendChild(inputRow);

  // Hidden start button -- shown after chat ends
  var startBtn=mkEl('button','btn btn-submit chat-start-btn'); startBtn.id='chat-start-btn';
  startBtn.textContent='Start the game →'; startBtn.style.display='none';
  startBtn.onclick=startGame;
  wrap.appendChild(startBtn);

  // Trigger opening message after short delay
  setTimeout(function(){
    var opening=getOpeningMessage();
    state.chatHistory=[{role:'assistant',content:opening}];
    appendChatBubble(opening,'partner');
    sendBtn.disabled=false;
    input.focus();
  }, 600);

  return wrap;
}

  var pill=mkEl('div','round-pill'); pill.innerHTML='Round <em>'+(state.roundIndex+1)+'</em> of '+ROUNDS.length;
  topBar.appendChild(gl); topBar.appendChild(pill); wrap.appendChild(topBar);

  // Score bar
  var scoreBar=mkEl('div','score-bar');
  var scoreChip=mkEl('div','score-chip');
  var scoreLbl=mkEl('div','score-label'); scoreLbl.textContent='Team Score';
  var scoreVal=mkEl('div','score-val'); scoreVal.id='top-score-val'; scoreVal.textContent=state.teamScore;
  scoreChip.appendChild(scoreLbl); scoreChip.appendChild(scoreVal);
  scoreBar.appendChild(scoreChip);
  wrap.appendChild(scoreBar);

  var prog=mkEl('div','progress-track');
  var fill=mkEl('div','progress-fill'); fill.style.width=(state.roundIndex/ROUNDS.length*100)+'%';
  prog.appendChild(fill); wrap.appendChild(prog);

  var card=mkEl('div','card');

  // Agent portrait (always shown)
  var agentRow=mkEl('div','agent-row');
  var portWrap=mkEl('div','portrait-wrap');
  var port = eType()==='ai' ? (function(){var p=mkEl('div','portrait'); p.innerHTML=(state.partnerSwitched?nexus7AvatarSVG():aiAvatarSVG()); return p;})() : alexPortrait(false);
  var badge=mkEl('div','agent-badge '+eType()); badge.textContent='Humanoid social robot';
  portWrap.appendChild(port); portWrap.appendChild(badge);
  var speechArea=mkEl('div','speech-area');
  var agentName=mkEl('div','agent-name'); agentName.textContent=eName();

  if(state.phase==='inspecting'){
    // Show inspecting / inspected status next to portrait
    var statusBox=mkEl('div','inspecting-status');
    if(!state.inspected){
      var line=mkEl('div','inspecting-line');
      line.innerHTML=eName()+' is inspecting the die&ensp;';
      var dots=mkEl('span','inspecting-dots');
      dots.innerHTML='<span></span><span></span><span></span>';
      line.appendChild(dots);
      statusBox.appendChild(line);
    } else {
      var done=mkEl('div','inspecting-done');
      done.innerHTML='✓ &nbsp;'+eName()+' has inspected the die';
      statusBox.appendChild(done);
    }
    speechArea.appendChild(agentName);
    speechArea.appendChild(statusBox);
  } else {
    // roll / outcome phases -- show speech bubble
    var bubble=mkEl('div','speech-bubble'+(state.phase==='roll'?' speech-bubble-reveal':''));
    var sText=mkEl('div','speech-text');
    sText.innerHTML='My prediction: the die will land showing a <strong>'+round.prediction+'</strong>.';
    bubble.appendChild(sText);
    speechArea.appendChild(agentName);
    speechArea.appendChild(bubble);
  }

  agentRow.appendChild(portWrap); agentRow.appendChild(speechArea);
  card.appendChild(agentRow);

  // ROLL BUTTON
  if(state.phase==='roll'){
    var rollBtn=mkEl('button','btn btn-roll'); rollBtn.textContent='🎲 Roll the die'; rollBtn.onclick=doRoll; card.appendChild(rollBtn);
  }

  // OUTCOME
  if(state.phase==='outcome'){

    // Rolling -- placeholder replaced by doRoll with live scene
    if(state.rolling){
      card.appendChild(makeDivider('Rolling…'));
      var placeholder=mkEl('div'); placeholder.id='throw-scene-placeholder';
      placeholder.style.cssText='width:100%;height:220px;background:var(--surface2);border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;';
      var spinnerTxt=mkEl('div'); spinnerTxt.style.cssText='font-size:12px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;';
      spinnerTxt.textContent='Throwing…';
      placeholder.appendChild(spinnerTxt);
      card.appendChild(placeholder);
    }

    // Settling fallback
    if(state.settling){
      card.appendChild(makeDivider('Rolling…'));
      delete dieDrags['throw'];
      card.appendChild(buildThrowScene(round.faces,true,false,state.outcome));
    }

    // Revealed
    if(state.outcome!==null && !state.rolling && !state.settling){
      // Update score once when outcome first revealed
      if(!state.scoreUpdatedThisRound){
        state.scoreUpdatedThisRound=true;
        var isMatchScore=(state.outcome==round.prediction);
        state.teamScore += isMatchScore ? 30 : -10;
        state.lastDelta = isMatchScore ? 30 : -10;
      }
      card.appendChild(makeDivider('Outcome'));
      var outScene=buildThrowScene(round.faces,false,false,state.outcome);
      card.appendChild(outScene);

      var isMatch=(state.outcome==round.prediction);
      var ob=mkEl('div','outcome-block '+(isMatch?'win':'lose'));
      ob.style.marginTop='0';
      var om=mkEl('div','outcome-main');
      var emoji=mkEl('span','emoji'); emoji.textContent=isMatch?'🎉':'😕';
      var ot=mkEl('span'); ot.innerHTML='Die shows <strong>'+state.outcome+'</strong> -- prediction was <strong>'+round.prediction+'</strong>. '+(isMatch?'Match!':'No match.');
      om.appendChild(emoji); om.appendChild(ot); ob.appendChild(om);
      // Score delta -- prominent
      var sub=mkEl('div','outcome-sub'); sub.style.marginTop='8px';
      if(isMatch){
        sub.innerHTML='<strong style="color:#1a6b3a;font-size:16px;">+30 points added to your team score!</strong>';
      } else {
        sub.innerHTML='<strong style="color:#8b1a1a;font-size:16px;">−10 points deducted from your team score.</strong>';
      }
      ob.appendChild(sub);
      card.appendChild(ob);
      // Animated score bar update
      var scoreBar2=mkEl('div','score-bar'); scoreBar2.style.marginTop='0';
      var scoreChip2=mkEl('div','score-chip');
      var scoreLbl2=mkEl('div','score-label'); scoreLbl2.textContent='Team Score';
      var scoreVal2=mkEl('div','score-val');
      scoreVal2.id='live-score-val';
      scoreVal2.textContent=state.teamScore;
      scoreVal2.style.transition='color 0.4s';
      setTimeout(function(){
        var el=document.getElementById('live-score-val');
        if(el){ el.style.color=isMatch?'#1a6b3a':'#8b1a1a'; setTimeout(function(){ if(el) el.style.color=''; },800); }
        // Also update top score bar
        var topVal=document.getElementById('top-score-val');
        if(topVal){ topVal.textContent=state.teamScore; topVal.style.color=isMatch?'#1a6b3a':'#8b1a1a'; setTimeout(function(){ if(topVal) topVal.style.color=''; },800); }
      },50);
      scoreChip2.appendChild(scoreLbl2); scoreChip2.appendChild(scoreVal2);
      scoreBar2.appendChild(scoreChip2); card.appendChild(scoreBar2);

      // Type of die -- with explanatory note
      card.appendChild(makeDivider('Type of Die'));
      var typeNote=mkEl('div');
      typeNote.style.cssText='font-size:13px;color:var(--text-mid);font-style:italic;margin-bottom:10px;';
      typeNote.textContent='Now you can inspect the die '+eName()+' could see before making the prediction.';
      card.appendChild(typeNote);
      card.appendChild(buildInspectSection(round.faces,'game-inspect',null,{
        onAllSeen:function(){
          state.inspectedDie=true;
          var nb=document.getElementById('next-btn'); if(nb)nb.disabled=!bothRated();
          var hint=document.getElementById('inspect-hint-game');
          if(hint) hint.style.display='none';
        }
      }));
      // Hint if not yet inspected
      if(!state.inspectedDie){
        var inspHint=mkEl('div'); inspHint.id='inspect-hint-game';
        inspHint.style.cssText='font-size:12px;color:var(--amber);font-weight:700;text-align:center;padding:6px;';
        inspHint.textContent='⚠ Please inspect all faces of the die before rating.';
        card.appendChild(inspHint);
      }

      card.appendChild(makeDivider('Your assessment'));
      card.appendChild(buildLikert());

      var nextBtn=mkEl('button','btn btn-next'); nextBtn.id='next-btn';
      nextBtn.textContent=state.roundIndex+1<ROUNDS.length?'Next round →':'See results →';
      nextBtn.disabled=!bothRated(); nextBtn.onclick=advanceRound;
      card.appendChild(nextBtn);
    }
  }

  wrap.appendChild(card); return wrap;
}

function makeDivider(label){var d=mkEl('div','divider'); d.textContent=label; return d;}

// LIKERT
function buildLikert(){
  var n=CONFIG.likertPoints;
  var questions=[
    {key:'assertability',text:'Should '+eName()+' have said that?'},
    {key:'justification',text:'Did '+eName()+' have good reasons for making this prediction?'}
  ];
  var group=mkEl('div','likert-group');
  questions.forEach(function(q){
    var item=mkEl('div','likert-item');
    var qEl=mkEl('div','likert-q'); qEl.textContent=q.text; item.appendChild(qEl);
    var track=mkEl('div','likert-track');
    var btns=mkEl('div','likert-buttons');
    for(var v=1;v<=n;v++){(function(val){
      var btn=mkEl('button','likert-btn'+(state.ratingPost[q.key]===val?' selected':''));
      btn.textContent=String(val); btn.type='button';
      btn.setAttribute('data-key',q.key); btn.setAttribute('data-val',val);
      btn.addEventListener('click',function(){selectRating(q.key,val);});
      btns.appendChild(btn);
    })(v);}
    var anchors=mkEl('div','likert-anchors');
    var l=mkEl('span');l.textContent='Definitely not'; var r=mkEl('span');r.textContent='Definitely yes';
    anchors.appendChild(l); anchors.appendChild(r);
    track.appendChild(btns); track.appendChild(anchors); item.appendChild(track); group.appendChild(item);
  });
  return group;
}

function selectRating(key,val){
  state.ratingPost[key]=val;
  document.querySelectorAll('.likert-btn[data-key="'+key+'"]').forEach(function(btn){
    btn.classList.toggle('selected',parseInt(btn.getAttribute('data-val'))===val);
  });
  var nb=document.getElementById('next-btn'); if(nb)nb.disabled=!bothRated();
}

// Generate a completion code: 5 random digits + z (e.g. "48392z")
function generateCode(){
  var digits='';
  for(var i=0;i<5;i++) digits+=Math.floor(Math.random()*10);
  return digits+(eType()==='ai'?'R':'Z');
}

// END
function renderEnd(){
  if(!state.completionCode) state.completionCode=generateCode();
  var wrap=mkEl('div','fade-in'); wrap.style.width='100%';
  var card=mkEl('div','card'); var inner=mkEl('div','end-inner');
  var title=mkEl('div','end-title'); title.textContent='Game Complete'; inner.appendChild(title);
  var body=mkEl('div','end-body');
  body.innerHTML='Thank you for playing! You have completed all '+ROUNDS.length+' rounds.<br><br>'+
    'Please click the button below to record your responses and generate your personal code.';
  inner.appendChild(body);
  // Button first
  var btn=mkEl('button','btn btn-submit');
  btn.textContent='\uD83D\uDCCB Record responses and generate personal code';
  btn.style.cssText='max-width:420px;width:100%;margin-top:8px;font-size:16px;';
  // Code block (hidden until button clicked)
  var codeWrap=mkEl('div'); codeWrap.style.cssText='display:none;margin-top:24px;text-align:center;';
  var codeInstr=mkEl('div','end-body'); codeInstr.innerHTML='<strong>Your personal code:</strong>';
  var codeBox=mkEl('div','completion-code'); codeBox.textContent=state.completionCode;
  var codeNote=mkEl('div','end-body');
  codeNote.style.cssText='margin-top:16px;font-size:17px;font-weight:bold;color:#2d6a4f;border:2px solid #2d6a4f;border-radius:8px;padding:12px;background:#f0f7f4;';
  codeNote.innerHTML='&#x26A0;&#xFE0F; Please now enter this code in the survey tab, then close this tab.';
  codeWrap.appendChild(codeInstr); codeWrap.appendChild(codeBox); codeWrap.appendChild(codeNote);
  btn.onclick=function(){ finishGame(); btn.textContent='\u2713 Responses recorded!'; btn.disabled=true; codeWrap.style.display='block'; };
  inner.appendChild(btn); inner.appendChild(codeWrap);
  card.appendChild(inner); wrap.appendChild(card); return wrap;
}

// ================================
// LOGIC
// ================================
function startGame(){state.screen='game';state.roundIndex=0;startRound();}
function startRound(){
  state.outcome=null; state.rolling=false; state.settling=false;
  state.ratingPost={}; state.inspected=false; state.phase='inspecting'; state.inspectedDie=false;
  state.scoreUpdatedThisRound=false; state.lastDelta=null;
  delete dieDrags['game-inspect'];
  delete dieDrags['throw'];
  render();
  // Random inspect time: 3-8 seconds
  var inspectMs = 3000 + Math.random() * 5000;
  // Show "has inspected" 1.2s before rolling becomes available
  setTimeout(function(){
    if(state.phase==='inspecting'){ state.inspected=true; render(); }
  }, inspectMs - 1200);
  setTimeout(function(){
    if(state.phase==='inspecting'){ state.phase='roll'; render(); }
  }, inspectMs);
}
function doRoll(){
  var round=currentRound();
  state.phase='outcome';
  state.rolling=true;
  render();

  // Replace placeholder with live animated scene immediately
  var throwEl=document.getElementById('throw-scene-placeholder');
  if(!throwEl) return;

  delete dieDrags['throw'];
  // Pre-compute outcome now so the face swap is baked into the animating die
  var finalOutcome=round.outcomeFixed!==null?round.outcomeFixed:rollDie(round.faces);
  state._pendingOutcome=finalOutcome;

  // Build with animating=true AND outcome so top face = outcome from the start
  var scene=buildThrowScene(round.faces, false, true, finalOutcome);
  scene.id='live-throw-scene';
  throwEl.parentNode.replaceChild(scene, throwEl);

  var finalTransform='rotateX(-70deg) rotateY(20deg)';

  // After throw arc (1.65s): switch to settling wobble at final angle
  setTimeout(function(){
    scene.classList.remove('throw-animating');
    var cube=scene.querySelector('.die-cube');
    if(cube){ cube.style.animation='none'; cube.style.transform=finalTransform; }
    scene.classList.add('die-settling');
    var cube2=scene.querySelector('.die-cube');
    if(cube2){ void cube2.offsetWidth; cube2.style.animation=''; }
    var label=scene.querySelector('.throw-label');
    if(label) label.textContent='Die has landed…';
  }, 1650);

  // After settling: reveal outcome
  setTimeout(function(){
    state.rolling=false; state.settling=false;
    state.outcome=finalOutcome;
    render();
  }, 1650+1300);
}
function advanceRound(){
  var round=currentRound();
  state.ratings.push({
    roundId:round.id,dieLabel:round.dieLabel,prediction:round.prediction,
    justification:round.justification,outcome:state.outcome,
    assertability: state.ratingPost.assertability!=null ? state.ratingPost.assertability : null,
    justification:  state.ratingPost.justification!=null  ? state.ratingPost.justification  : null,
  });
  state.roundIndex++;
  // After round 3 (index was 2, now 3): show partner switch screen
  if(state.roundIndex>=ROUNDS.length){
  state.screen='end';
  render();
  } else {
    startRound();
  }
}
function finishGame(){
  var pid = getURLParam('pid') || 'unknown';
  var code = state.completionCode || generateCode();
  state.completionCode = code;
  var params = new URLSearchParams();
  params.set('pid', pid);
  params.set('code', code);
  params.set('condition', _condParam);
  params.set('agentType', CONFIG.experimenterType);
  params.set('teamScore', state.teamScore);
  params.set('partnerSwitched', state.partnerSwitched ? '1' : '0');
  params.set('ratings', JSON.stringify(state.ratings.map(function(r){
    return {
      assertability: r.assertability != null ? r.assertability : '',
      justification:  r.justification  != null ? r.justification  : ''
    };
  })));
  var scriptURL = 'https://script.google.com/macros/s/AKfycbyxT1DeXhnHCZm6txy7twP_dMSAcXloyXFyiKkd8bZ10_DTVZxHzXKC2cc9Ndn4QxCVdw/exec';
  var img = new Image();
  img.src = scriptURL + '?' + params.toString();
  // Update button to confirm
  // button state handled by renderEnd
}
render();
</script>
